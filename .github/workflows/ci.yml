name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  format:
    name: Rustfmt Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  build-and-test:
    name: Build and Test
    needs: format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          targets: wasm32-unknown-unknown
          components: clippy
      - run: cargo build --release --target wasm32-unknown-unknown
      - run: cargo test --locked
      - run: cargo clippy --lib --locked -- -D warnings

  wasm-size:
    name: Check WASM Size
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.90.0
          targets: wasm32-unknown-unknown
      - run: cargo build --release --target wasm32-unknown-unknown
      - name: Check WASM size
        run: |
          WASM="target/wasm32-unknown-unknown/release/remitflow_contract.wasm"
          SIZE=$(wc -c < "$WASM")
          MAX_SIZE=65536
          echo "WASM size: $SIZE bytes (max: $MAX_SIZE)"
          if [ "$SIZE" -gt "$MAX_SIZE" ]; then
            echo "ERROR: WASM exceeds $MAX_SIZE bytes limit"
            exit 1
          fi
